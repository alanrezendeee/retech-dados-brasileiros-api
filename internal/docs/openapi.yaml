openapi: 3.0.3
info:
  title: Retech Core API
  version: 1.0.0
  description: |
    # 🚀 Retech Core API
    
    A API definitiva de dados brasileiros para desenvolvedores.
    
    ## 🎯 Características
    
    - ⚡ **Performance**: Respostas em <100ms
    - 🔒 **Segurança**: API Key + Rate Limiting
    - 📊 **Dados**: Geografia, CEP, CNPJ, CPF e mais
    - 🎁 **Gratuito**: 100 requests/dia no plano Free
    
    ## 🔐 Autenticação
    
    Use o header `X-API-Key` com sua chave de API:
    
    ```bash
    curl __API_BASE_URL__/geo/ufs \
      -H "X-API-Key: sua_api_key_aqui"
    ```
    
    ## 📈 Rate Limiting
    
    - **Plano Free**: 100 requests/dia, 5/min
    - **Plano Starter**: 1.000 requests/dia, 30/min
    - **Plano Pro**: 10.000 requests/dia, 120/min
    - **Plano Business**: 100.000 requests/dia, 600/min
    - **Plano Enterprise**: Custom
    
    ## 📚 Mais Informações
    
    - **Portal do Desenvolvedor**: https://core.theretech.com.br
    - **Documentação Completa**: https://core.theretech.com.br/painel/docs
    - **Status**: https://status.theretech.com.br
    
  contact:
    name: Retech Support
    email: suporte@theretech.com.br
    url: https://core.theretech.com.br
  license:
    name: Proprietary
    url: https://core.theretech.com.br/termos

servers:
  - url: __API_BASE_URL__

tags:
  - name: Infraestrutura
    description: Health checks e informações do sistema
  - name: CEP
    description: Consulta de CEP com cache e múltiplas fontes
  - name: CNPJ
    description: Consulta de CNPJ com dados da Receita Federal
  - name: Geografia
    description: Estados, municípios e dados geográficos do Brasil
  - name: Artigos Penais
    description: Artigos penais brasileiros (Codigo Penal + legislacoes especiais)

paths:
  # ==========================================
  # INFRAESTRUTURA
  # ==========================================
  /health:
    get:
      tags: [Infraestrutura]
      summary: Health Check
      description: Verifica se a API está funcionando
      responses:
        '200':
          description: API funcionando normalmente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"

  /version:
    get:
      tags: [Infraestrutura]
      summary: Versão da API
      description: Retorna informações sobre a versão atual
      responses:
        '200':
          description: Informações da versão
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: "1.0.0"
                  environment:
                    type: string
                    example: "production"

  # ==========================================
  # CEP
  # ==========================================
  /cep/{codigo}:
    get:
      tags: [CEP]
      summary: Consultar CEP
      description: |
        Consulta um CEP brasileiro. 
        
        **Fontes de Dados:**
        - 🥇 **ViaCEP** (principal)
        - 🥈 **Brasil API** (fallback)
        - 💾 **Cache** (7 dias)
        
        **Performance:**
        - Cache: < 10ms
        - ViaCEP: ~50ms
        - Brasil API: ~100ms
        
        **Formato aceito:**
        - Com traço: `01310-100`
        - Sem traço: `01310100`
        
      security:
        - ApiKeyAuth: []
      parameters:
        - name: codigo
          in: path
          required: true
          description: "CEP brasileiro (com ou sem traço)"
          schema:
            type: string
            example: "01310-100"
      responses:
        '200':
          description: CEP encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CEP'
              examples:
                avenida_paulista:
                  summary: "Av. Paulista - São Paulo"
                  value:
                    cep: "01310-100"
                    logradouro: "Avenida Paulista"
                    complemento: "de 612 a 1510 - lado par"
                    bairro: "Bela Vista"
                    localidade: "São Paulo"
                    uf: "SP"
                    ibge: "3550308"
                    ddd: "11"
                    source: "viacep"
                    cachedAt: "2025-10-23T15:30:00Z"
                copacabana:
                  summary: "Copacabana - Rio de Janeiro"
                  value:
                    cep: "22021-001"
                    logradouro: "Avenida Atlântica"
                    bairro: "Copacabana"
                    localidade: "Rio de Janeiro"
                    uf: "RJ"
                    ibge: "3304557"
                    ddd: "21"
                    source: "cache"
                    cachedAt: "2025-10-20T10:15:00Z"
        '400':
          description: CEP inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: "https://retech-core/errors/validation"
                title: "Invalid CEP"
                status: 400
                detail: "CEP deve ter 8 dígitos"
        '404':
          description: CEP não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: "https://retech-core/errors/not-found"
                title: "CEP Not Found"
                status: 404
                detail: "CEP 99999999 não encontrado"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/Maintenance'

  /cep/buscar:
    get:
      tags: [CEP]
      summary: Buscar CEP por Endereço (Busca Reversa)
      description: |
        🆕 **Busca reversa de CEP**: encontra CEPs a partir do endereço.
        
        Digite a rua, cidade e estado para descobrir até **50 CEPs** correspondentes.
        
        ⭐ **Disponível a partir do plano Starter** — no plano Free retorna `403` com `{"error": "upgrade_required"}`.
        
        **Fontes de Dados:**
        - 🥇 **ViaCEP** (busca por endereço)
        - 💾 **Cache** (7 dias)
        
        **Performance:**
        - Cache: ~1-10ms
        - ViaCEP: ~100-200ms
        
        **Validações:**
        - ✅ UF deve ter 2 caracteres (ex: SP, RJ)
        - ✅ Cidade deve ter no mínimo 3 caracteres
        - ✅ Logradouro deve ter no mínimo 3 caracteres
        
        **Limitações:**
        - 📋 Retorna até 50 CEPs por busca
        - 🔍 Quanto mais específico, melhor o resultado
        - 📝 Busca por aproximação de nome
        
        **Exemplos de uso:**
        ```bash
        # Com acentos (recomendado - mais preciso)
        curl "__API_BASE_URL__/cep/buscar?uf=SP&cidade=São+Paulo&logradouro=Paulista" \
          -H "X-API-Key: sua_api_key_aqui"
        
        # Sem acentos (funciona, mas menos preciso)
        curl "__API_BASE_URL__/cep/buscar?uf=SP&cidade=Sao+Paulo&logradouro=Paulista" \
          -H "X-API-Key: sua_api_key_aqui"
        
        # URL encoded (também funciona)
        curl "__API_BASE_URL__/cep/buscar?uf=RS&cidade=Porto%20Alegre&logradouro=Andradas" \
          -H "X-API-Key: sua_api_key_aqui"
        ```
        
        **📝 Dicas de Formatação:**
        - ✅ **Acentos:** Pode enviar com acentos! A API normaliza automaticamente.
        - ✅ **Espaços:** Use `+` ou `%20` (ambos funcionam)
        - ✅ **Case:** Maiúsculas/minúsculas não importam (exceto UF que deve ser MAIÚSCULO)
        - ⚡ **Encoding:** Feito automaticamente pelo backend
        
        **Casos de uso:**
        - 📝 Autocomplete de endereços
        - ✅ Validação de formulários
        - 🔄 Preenchimento automático de CEP
        - 🔍 Busca quando usuário não sabe o CEP
        
      security:
        - ApiKeyAuth: []
      parameters:
        - name: uf
          in: query
          required: true
          description: "Sigla do estado (2 caracteres)"
          schema:
            type: string
            minLength: 2
            maxLength: 2
            example: "SP"
        - name: cidade
          in: query
          required: true
          description: |
            Nome da cidade (mínimo 3 caracteres)
            
            **✅ Aceita acentos:** "São Paulo", "João Pessoa", "Brasília"
            
            **Encoding:** A API faz URL encoding automaticamente. Você pode enviar:
            - Com acentos: `cidade=São Paulo` (recomendado)
            - Sem acentos: `cidade=Sao Paulo` (funciona, mas menos preciso)
            - URL encoded: `cidade=S%C3%A3o%20Paulo` (também funciona)
          schema:
            type: string
            minLength: 3
            example: "São Paulo"
        - name: logradouro
          in: query
          required: true
          description: |
            Nome da rua/avenida (mínimo 3 caracteres)
            
            **✅ Aceita acentos:** "João Pessoa", "São José", "Cristóvão"
            
            **Dica:** Quanto mais específico, melhor o resultado.
            - ✅ Bom: "Paulista"
            - ✅ Melhor: "Avenida Paulista"
            - ❌ Muito genérico: "Rua" (pode retornar muitos resultados)
          schema:
            type: string
            minLength: 3
            example: "Paulista"
      responses:
        '200':
          description: CEPs encontrados
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/CEP'
                    description: Lista de CEPs encontrados (até 50)
                  count:
                    type: integer
                    description: Número de resultados retornados
                    example: 12
                  source:
                    type: string
                    description: Fonte dos dados
                    enum: [viacep, redis-cache, mongodb-cache]
                    example: "viacep"
              examples:
                paulista_sp:
                  summary: "Avenida Paulista - São Paulo/SP"
                  value:
                    results:
                      - cep: "01310100"
                        logradouro: "Avenida Paulista"
                        complemento: "de 612 a 1510 - lado par"
                        bairro: "Bela Vista"
                        localidade: "São Paulo"
                        uf: "SP"
                        ibge: "3550308"
                        ddd: "11"
                        source: "viacep"
                      - cep: "01311000"
                        logradouro: "Avenida Paulista"
                        complemento: "de 1865 a 2265 - lado ímpar"
                        bairro: "Bela Vista"
                        localidade: "São Paulo"
                        uf: "SP"
                        ibge: "3550308"
                        ddd: "11"
                        source: "viacep"
                      - cep: "01311100"
                        logradouro: "Avenida Paulista"
                        complemento: "de 1537 a 1863 - lado ímpar"
                        bairro: "Bela Vista"
                        localidade: "São Paulo"
                        uf: "SP"
                        ibge: "3550308"
                        ddd: "11"
                        source: "viacep"
                    count: 3
                    source: "viacep"
                from_cache:
                  summary: "Resultado do cache (rápido)"
                  value:
                    results:
                      - cep: "90010150"
                        logradouro: "Rua dos Andradas"
                        bairro: "Centro Histórico"
                        localidade: "Porto Alegre"
                        uf: "RS"
                        ibge: "4314902"
                        ddd: "51"
                        source: "redis-cache"
                    count: 1
                    source: "redis-cache"
        '400':
          description: Parâmetros inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_params:
                  summary: "Parâmetros obrigatórios ausentes"
                  value:
                    type: "https://retech-core/errors/validation"
                    title: "Invalid Parameters"
                    status: 400
                    detail: "Parâmetros obrigatórios: uf, cidade, logradouro"
                min_length:
                  summary: "Tamanho mínimo não atingido"
                  value:
                    type: "https://retech-core/errors/validation"
                    title: "Invalid Parameters"
                    status: 400
                    detail: "Cidade e logradouro devem ter no mínimo 3 caracteres"
                invalid_uf:
                  summary: "UF inválida"
                  value:
                    type: "https://retech-core/errors/validation"
                    title: "Invalid UF"
                    status: 400
                    detail: "UF deve ter 2 caracteres (ex: SP, RJ, RS)"
        '404':
          description: Nenhum CEP encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: "https://retech-core/errors/not-found"
                title: "CEPs Not Found"
                status: 404
                detail: "Nenhum CEP encontrado para o endereço informado"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/Maintenance'

  # ==========================================
  # CNPJ
  # ==========================================
  /cnpj/{numero}:
    get:
      tags: [CNPJ]
      summary: Consultar CNPJ
      description: |
        Consulta dados completos de uma empresa pelo CNPJ.
        
        **Fontes de Dados:**
        - 🥇 **Brasil API** (principal - Receita Federal)
        - 🥈 **ReceitaWS** (fallback)
        - 💾 **Cache** (30 dias)
        
        **Performance:**
        - Cache: < 10ms
        - Brasil API: ~200-500ms
        - ReceitaWS: ~500-1000ms
        
        **Formato aceito:**
        - Com formatação: `00.000.000/0001-91`
        - Sem formatação: `00000000000191`
        
        **Validação:**
        - ✅ Dígito verificador obrigatório
        - ❌ CNPJs inválidos retornam 400
        
      security:
        - ApiKeyAuth: []
      parameters:
        - name: numero
          in: path
          required: true
          description: "CNPJ brasileiro (com ou sem formatação)"
          schema:
            type: string
            example: "00.000.000/0001-91"
      responses:
        '200':
          description: CNPJ encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CNPJ'
              examples:
                banco_do_brasil:
                  summary: "Banco do Brasil S.A."
                  value:
                    cnpj: "00000000000191"
                    razaoSocial: "BANCO DO BRASIL SA"
                    nomeFantasia: "BANCO DO BRASIL"
                    situacao: "ATIVA"
                    dataSituacao: "2005-11-03"
                    dataAbertura: "1966-08-30"
                    porte: "DEMAIS"
                    naturezaJuridica: "Sociedade de Economia Mista"
                    capitalSocial: 81250000000.00
                    endereco:
                      logradouro: "SBS Quadra 1 Bloco G"
                      numero: "S/N"
                      complemento: "LOJA LOJA 1 SUBSOLO 1"
                      bairro: "ASA SUL"
                      cep: "70073901"
                      municipio: "Brasília"
                      uf: "DF"
                    telefones: ["(61) 3493-9002"]
                    email: "prov@bb.com.br"
                    atividadePrincipal:
                      codigo: "64.21-2-00"
                      descricao: "Bancos comerciais"
                    atividadesSecundarias:
                      - codigo: "66.19-3-99"
                        descricao: "Outras atividades auxiliares dos serviços financeiros"
                    qsa:
                      - nome: "EXEMPLO NOME SOCIO"
                        qualificacao: "Diretor"
                    source: "brasilapi"
                    cachedAt: "2025-10-23T22:30:00Z"
        '400':
          description: CNPJ inválido (dígito verificador errado)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: "https://retech-core/errors/validation"
                title: "CNPJ Inválido"
                status: 400
                detail: "CNPJ deve ter 14 dígitos válidos"
        '404':
          description: CNPJ não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: "https://retech-core/errors/not-found"
                title: "CNPJ Not Found"
                status: 404
                detail: "CNPJ 99999999999999 não encontrado ou indisponível"
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  # ==========================================
  # GEOGRAFIA
  # ==========================================
  /geo/ufs:
    get:
      tags: [Geografia]
      summary: Listar Estados
      description: |
        Retorna todos os 27 estados brasileiros com informações completas.
        
        **Exemplo de uso:**
        ```bash
        curl __API_BASE_URL__/geo/ufs \
          -H "X-API-Key: sua_api_key_aqui"
        ```
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Lista de estados
          content:
            application/json:
              schema:
                type: object
                properties:
                  estados:
                    type: array
                    items:
                      $ref: '#/components/schemas/Estado'
              example:
                estados:
                  - id: 26
                    sigla: "PE"
                    nome: "Pernambuco"
                    regiao:
                      id: 2
                      sigla: "NE"
                      nome: "Nordeste"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/Maintenance'

  /geo/ufs/{sigla}:
    get:
      tags: [Geografia]
      summary: Buscar Estado por Sigla
      description: |
        Retorna detalhes de um estado específico pela sigla.
        
        **Exemplo de uso:**
        ```bash
        curl __API_BASE_URL__/geo/ufs/PE \
          -H "X-API-Key: sua_api_key_aqui"
        ```
      security:
        - ApiKeyAuth: []
      parameters:
        - name: sigla
          in: path
          required: true
          description: "Sigla do estado (ex: SP, RJ, PE)"
          schema:
            type: string
            example: "PE"
      responses:
        '200':
          description: Detalhes do estado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Estado'
              example:
                id: 26
                sigla: "PE"
                nome: "Pernambuco"
                regiao:
                  id: 2
                  sigla: "NE"
                  nome: "Nordeste"
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /geo/municipios:
    get:
      tags: [Geografia]
      summary: Listar Municípios
      description: |
        Retorna todos os municípios ou filtra por UF/nome.
        
        **Exemplo de uso:**
        ```bash
        # Todos os municípios
        curl __API_BASE_URL__/geo/municipios \
          -H "X-API-Key: sua_api_key_aqui"
        
        # Filtrar por UF
        curl "__API_BASE_URL__/geo/municipios?uf=PE" \
          -H "X-API-Key: sua_api_key_aqui"
        
        # Buscar por nome
        curl "__API_BASE_URL__/geo/municipios?q=Recife" \
          -H "X-API-Key: sua_api_key_aqui"
        ```
      security:
        - ApiKeyAuth: []
      parameters:
        - name: uf
          in: query
          description: "Filtrar por UF (ex: PE, SP)"
          schema:
            type: string
            example: "PE"
        - name: q
          in: query
          description: Buscar por nome
          schema:
            type: string
            example: "Recife"
      responses:
        '200':
          description: Lista de municípios
          content:
            application/json:
              schema:
                type: object
                properties:
                  municipios:
                    type: array
                    items:
                      $ref: '#/components/schemas/Municipio'

  /geo/municipios/{uf}:
    get:
      tags: [Geografia]
      summary: Municípios de um Estado
      description: |
        Retorna todos os municípios de um estado específico.
        
        **Exemplo de uso:**
        ```bash
        curl __API_BASE_URL__/geo/municipios/PE \
          -H "X-API-Key: sua_api_key_aqui"
        ```
      security:
        - ApiKeyAuth: []
      parameters:
        - name: uf
          in: path
          required: true
          description: Sigla do estado
          schema:
            type: string
            example: "PE"
      responses:
        '200':
          description: Lista de municípios do estado
          content:
            application/json:
              schema:
                type: object
                properties:
                  municipios:
                    type: array
                    items:
                      $ref: '#/components/schemas/Municipio'

  # ==========================================
  # ARTIGOS PENAIS
  # ==========================================
  /penal/artigos:
    get:
      tags: [Artigos Penais]
      summary: Listar Artigos Penais (Autocomplete)
      description: |
        Retorna todos os artigos penais brasileiros, ideal para autocomplete/Select2.
        
        **Fontes de Dados:**
        - 💾 **Dados fixos** (seed inicial no MongoDB)
        - 🥇 **Cache Redis** (permanente - ~1ms)
        - 🥈 **MongoDB** (~10ms se cache miss)
        
        **Performance:**
        - Cache Redis: ~1ms
        - MongoDB: ~10ms
        - Dados fixos (não expira)
        
        **Filtros Disponíveis:**
        - `q` (opcional): Busca por texto na descricao
        - `tipo` (opcional): Filtrar por tipo (`crime` ou `contravencao`)
        - `legislacao` (opcional): Filtrar por legislacao (`CP`, `LCP`, `Lei 11.343/2006`, etc)
        
        **Uso tipico (Autocomplete/Select2):**
        ```javascript
        // React Select / Select2
        fetch('__API_BASE_URL__/penal/artigos?q=homicidio', {
          headers: { 'X-API-Key': 'sua_chave' }
        })
        .then(res => res.json())
        .then(data => {
          // data.data contem array de artigos
          const options = data.data.map(a => ({
            value: a.codigo,
            label: a.codigoFormatado + ' - ' + a.descricao
          }));
        });
        ```
        
        **Exemplo de uso:**
        ```bash
        # Listar todos os artigos
        curl __API_BASE_URL__/penal/artigos \
          -H "X-API-Key: sua_api_key_aqui"
        
        # Buscar artigos de homicídio
        curl "__API_BASE_URL__/penal/artigos?q=homicidio" \
          -H "X-API-Key: sua_api_key_aqui"
        
        # Filtrar apenas crimes do CP
        curl "__API_BASE_URL__/penal/artigos?tipo=crime&legislacao=CP" \
          -H "X-API-Key: sua_api_key_aqui"
        ```
      security:
        - ApiKeyAuth: []
      parameters:
        - name: q
          in: query
          required: false
          description: "Busca por texto (descricao, codigo, texto completo)"
          schema:
            type: string
            example: "homicidio"
        - name: tipo
          in: query
          required: false
          description: "Filtrar por tipo: crime ou contravencao"
          schema:
            type: string
            enum: [crime, contravencao]
            example: "crime"
        - name: legislacao
          in: query
          required: false
          description: "Filtrar por legislacao: CP, LCP, Lei 11.343/2006, etc"
          schema:
            type: string
            example: "CP"
      responses:
        '200':
          description: Lista de artigos penais
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  code:
                    type: string
                    example: "OK"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ArtigoPenal'
              examples:
                todos_artigos:
                  summary: "Todos os artigos (sem filtros)"
                  value:
                    success: true
                    code: "OK"
                    data:
                      - codigo: "121"
                        codigoFormatado: "Art. 121 do CP"
                        descricao: "Homicídio simples"
                        tipo: "crime"
                        legislacao: "CP"
                        legislacaoNome: "Codigo Penal"
                      - codigo: "121.1"
                        codigoFormatado: "Art. 121, § 1º do CP"
                        descricao: "Homicídio qualificado"
                        tipo: "crime"
                        legislacao: "CP"
                        legislacaoNome: "Codigo Penal"
                busca_texto:
                  summary: "Busca por texto (q=homicidio)"
                  value:
                    success: true
                    code: "OK"
                    data:
                      - codigo: "121"
                        codigoFormatado: "Art. 121 do CP"
                        descricao: "Homicídio simples"
                        tipo: "crime"
                        legislacao: "CP"
                        legislacaoNome: "Codigo Penal"
                      - codigo: "121.1"
                        codigoFormatado: "Art. 121, § 1º do CP"
                        descricao: "Homicídio qualificado"
                        tipo: "crime"
                        legislacao: "CP"
                        legislacaoNome: "Codigo Penal"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/Maintenance'

  /penal/artigos/{codigo}:
    get:
      tags: [Artigos Penais]
      summary: Buscar Artigo Penal Específico
      description: |
        Retorna detalhes completos de um artigo penal especifico pelo codigo.

        **Formato do codigo:**
        - Artigo simples: `121`
        - Com parágrafo: `121.1` (Art. 121, § 1º)
        - Com inciso: `121.1.I` (Art. 121, § 1º, I)
        - Com alínea: `121.1.I.a` (Art. 121, § 1º, I, a)
        
        **Performance:**
        - Cache Redis: ~1ms
        - MongoDB: ~10ms
        - Dados fixos (não expira)
        
        **Exemplo de uso:**
        ```bash
        # Buscar artigo 121 (homicídio simples)
        curl __API_BASE_URL__/penal/artigos/121 \
          -H "X-API-Key: sua_api_key_aqui"
        
        # Buscar parágrafo 1º do artigo 121
        curl __API_BASE_URL__/penal/artigos/121.1 \
          -H "X-API-Key: sua_api_key_aqui"
        
        # Buscar inciso I do parágrafo 1º do artigo 121
        curl __API_BASE_URL__/penal/artigos/121.1.I \
          -H "X-API-Key: sua_api_key_aqui"
        ```
      security:
        - ApiKeyAuth: []
      parameters:
        - name: codigo
          in: path
          required: true
          description: "Codigo do artigo (ex: 121, 121.1, 121.1.I, 121.1.I.a)"
          schema:
            type: string
            example: "121"
      responses:
        '200':
          description: Artigo encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  code:
                    type: string
                    example: "OK"
                  data:
                    $ref: '#/components/schemas/ArtigoPenalCompleto'
              examples:
                homicidio_simples:
                  summary: "Art. 121 - Homicídio simples"
                  value:
                    success: true
                    code: "OK"
                    data:
                      codigo: "121"
                      codigoFormatado: "Art. 121 do CP"
                      artigo: 121
                      descricao: "Homicídio simples"
                      textoCompleto: "Matar alguém:\nPena - reclusão, de 6 (seis) a 20 (vinte) anos."
                      tipo: "crime"
                      legislacao: "CP"
                      legislacaoNome: "Código Penal"
                      penaMin: "Reclusão, de 6 a 20 anos"
                      penaMax: ""
                homicidio_qualificado:
                  summary: "Art. 121, § 1º - Homicídio qualificado"
                  value:
                    success: true
                    code: "OK"
                    data:
                      codigo: "121.1"
                      codigoFormatado: "Art. 121, § 1º do CP"
                      artigo: 121
                      paragrafo: 1
                      descricao: "Homicídio qualificado"
                      textoCompleto: "Se o homicídio é cometido:\nI - mediante pago, promessa de recompensa ou motivo fútil;\nII - por motivo de relevante valor social ou moral;\nIII - contra ascendente, descendente, cônjuge, companheiro ou irmão;\nIV - com emprego de veneno, fogo, explosivo, asfixia, tortura ou outro meio insidioso ou cruel, ou que possa resultar perigo comum;\nV - à traição, de emboscada, ou mediante dissimulação ou outro recurso que dificulte ou torne impossível a defesa do ofendido;\nVI - contra autoridade ou contra membro de conselho tutelar, do Ministério Público, da Magistratura ou do Tribunal de Contas, no exercício da função ou em razão dela, ou contra seu cônjuge, ascendente ou descendente;\nVII - contra criança, adolescente, gestante, deficiente físico ou mental ou pessoa maior de 60 (sessenta) anos;\nVIII - que decorra de violência doméstica e familiar ou de discriminação ou preconceito de raça, cor, etnia, religião, origem, condição de pessoa idosa, criança, adolescente ou pessoa com deficiência;\nIX - contra membro de grupo vulnerável, em razão da condição de vulnerabilidade.\nPena - reclusão, de 12 (doze) a 30 (trinta) anos."
                      tipo: "crime"
                      legislacao: "CP"
                      legislacaoNome: "Código Penal"
                      penaMin: "Reclusão, de 12 a 30 anos"
                      penaMax: ""
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/Maintenance'

  /penal/search:
    get:
      tags: [Artigos Penais]
      summary: Buscar Artigos por Texto
      description: |
        Busca artigos penais por texto na descricao ou texto completo.
        
        **Fontes de Dados:**
        - 💾 **Dados fixos** (seed inicial no MongoDB)
        - 🥇 **Cache Redis** (permanente - ~1ms)
        - 🥈 **MongoDB** (~10ms se cache miss)
        
        **Performance:**
        - Cache Redis: ~1ms
        - MongoDB text search: ~50ms
        - Dados fixos (não expira)
        
        **Busca inteligente:**
        - Busca no campo `busca` (normalizado, lowercase, sem acentos)
        - Busca em descricao, texto completo e codigo formatado
        - Case-insensitive
        - Aceita termos parciais
        
        **Exemplo de uso:**
        ```bash
        # Buscar artigos sobre "matar alguém"
        curl "__API_BASE_URL__/penal/search?q=matar%20alguem" \
          -H "X-API-Key: sua_api_key_aqui"
        
        # Buscar artigos sobre "roubo"
        curl "__API_BASE_URL__/penal/search?q=roubo" \
          -H "X-API-Key: sua_api_key_aqui"
        ```
        
        **⚠️ Tratamento de dados:**
        - ✅ **Acentos:** Aceita com ou sem acentos ("homicidio" = "homicídio")
        - ✅ **Case:** Maiúsculas/minúsculas não importam ("HOMICIDIO" = "homicidio")
        - ✅ **Encoding:** Automático pelo backend (espaços: + ou %20)
        - ⚠️ **Formato:** Use espaços ou + para separar palavras
      security:
        - ApiKeyAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: "Texto a buscar (descricao, texto completo ou codigo)"
          schema:
            type: string
            example: "matar alguém"
      responses:
        '200':
          description: Artigos encontrados
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  code:
                    type: string
                    example: "OK"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ArtigoPenalCompleto'
              examples:
                busca_matamento:
                  summary: "Busca por 'matar alguém'"
                  value:
                    success: true
                    code: "OK"
                    data:
                      - codigo: "121"
                        codigoFormatado: "Art. 121 do CP"
                        descricao: "Homicídio simples"
                        textoCompleto: "Matar alguém:\nPena - reclusão, de 6 (seis) a 20 (vinte) anos."
                        tipo: "crime"
                        legislacao: "CP"
                        legislacaoNome: "Codigo Penal"
        '400':
          description: Parâmetro de busca inválido (q obrigatório)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: "https://retech-core/errors/validation"
                title: "Validation Error"
                status: 400
                detail: "Parâmetro 'q' é obrigatório para busca"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/Maintenance'

components:
  schemas:
    CEP:
      type: object
      description: Representa um endereço completo a partir de um CEP
      properties:
        cep:
          type: string
          description: CEP formatado
          example: "01310-100"
        logradouro:
          type: string
          description: Nome da rua/avenida
          example: "Avenida Paulista"
        complemento:
          type: string
          description: Complemento do endereço (ex. "de 612 a 1510 - lado par")
          example: "de 612 a 1510 - lado par"
        bairro:
          type: string
          description: Nome do bairro
          example: "Bela Vista"
        localidade:
          type: string
          description: Nome da cidade
          example: "São Paulo"
        uf:
          type: string
          description: Sigla do estado
          example: "SP"
        ibge:
          type: string
          description: Codigo IBGE do municipio
          example: "3550308"
        ddd:
          type: string
          description: Codigo DDD
          example: "11"
        latitude:
          type: number
          format: float
          description: Latitude (quando disponível)
          example: -23.5617
        longitude:
          type: number
          format: float
          description: Longitude (quando disponível)
          example: -46.6562
        source:
          type: string
          description: Fonte dos dados
          enum: [viacep, brasilapi, cache]
          example: "viacep"
        cachedAt:
          type: string
          format: date-time
          description: Data/hora do cache (quando aplicável)
          example: "2025-10-23T15:30:00Z"

    CNPJ:
      type: object
      description: Representa uma empresa brasileira com dados da Receita Federal
      properties:
        cnpj:
          type: string
          description: CNPJ (apenas números)
          example: "00000000000191"
        razaoSocial:
          type: string
          description: Razão social (nome legal)
          example: "BANCO DO BRASIL SA"
        nomeFantasia:
          type: string
          description: Nome fantasia (marca)
          example: "BANCO DO BRASIL"
        situacao:
          type: string
          description: Situação cadastral
          enum: [ATIVA, BAIXADA, SUSPENSA, INAPTA, NULA]
          example: "ATIVA"
        dataSituacao:
          type: string
          format: date
          description: Data da situação cadastral
          example: "2005-11-03"
        dataAbertura:
          type: string
          format: date
          description: Data de abertura/constituição
          example: "1966-08-30"
        porte:
          type: string
          description: Porte da empresa
          enum: [MEI, MICRO EMPRESA, EMPRESA DE PEQUENO PORTE, DEMAIS]
          example: "DEMAIS"
        naturezaJuridica:
          type: string
          description: Natureza jurídica
          example: "Sociedade de Economia Mista"
        capitalSocial:
          type: number
          format: double
          description: Capital social em reais
          example: 81250000000.00
        endereco:
          $ref: '#/components/schemas/CNPJEndereco'
        telefones:
          type: array
          items:
            type: string
          description: Lista de telefones
          example: ["(61) 3493-9002"]
        email:
          type: string
          format: email
          description: E-mail da empresa
          example: "prov@bb.com.br"
        atividadePrincipal:
          $ref: '#/components/schemas/CNPJAtividade'
        atividadesSecundarias:
          type: array
          items:
            $ref: '#/components/schemas/CNPJAtividade'
          description: Lista de CNAEs secundários
        qsa:
          type: array
          items:
            $ref: '#/components/schemas/CNPJSocio'
          description: Quadro de Sócios e Administradores
        source:
          type: string
          description: Fonte dos dados
          enum: [brasilapi, receitaws, cache]
          example: "brasilapi"
        cachedAt:
          type: string
          format: date-time
          description: Data/hora do cache
          example: "2025-10-23T22:30:00Z"

    CNPJEndereco:
      type: object
      description: Endereço da empresa
      properties:
        logradouro:
          type: string
          example: "SBS Quadra 1 Bloco G"
        numero:
          type: string
          example: "S/N"
        complemento:
          type: string
          example: "LOJA LOJA 1 SUBSOLO 1"
        bairro:
          type: string
          example: "ASA SUL"
        cep:
          type: string
          example: "70073901"
        municipio:
          type: string
          example: "Brasília"
        uf:
          type: string
          example: "DF"

    CNPJAtividade:
      type: object
      description: Atividade econômica (CNAE)
      properties:
        codigo:
          type: string
          description: Codigo CNAE
          example: "64.21-2-00"
        descricao:
          type: string
          description: Descricao da atividade
          example: "Bancos comerciais"

    CNPJSocio:
      type: object
      description: Sócio ou administrador
      properties:
        nome:
          type: string
          description: Nome completo
          example: "JOÃO DA SILVA"
        qualificacao:
          type: string
          description: Cargo/qualificação
          example: "Diretor"

    Estado:
      type: object
      description: Representa um estado brasileiro
      properties:
        id:
          type: integer
          description: Codigo IBGE do estado
          example: 26
        sigla:
          type: string
          description: Sigla UF (2 caracteres)
          example: "PE"
        nome:
          type: string
          description: Nome do estado
          example: "Pernambuco"
        regiao:
          $ref: '#/components/schemas/Regiao'

    Regiao:
      type: object
      description: Região geográfica brasileira
      properties:
        id:
          type: integer
          description: Codigo IBGE da regiao
          example: 2
        sigla:
          type: string
          description: Sigla da região
          example: "NE"
        nome:
          type: string
          description: Nome da região
          example: "Nordeste"

    Municipio:
      type: object
      description: Representa um município brasileiro
      properties:
        id:
          type: integer
          description: Codigo IBGE do municipio
          example: 2611606
        nome:
          type: string
          description: Nome do município
          example: "Recife"
        microrregiao:
          type: object
          description: Microrregião do IBGE
        regiao-imediata:
          type: object
          description: Região imediata (nova divisão IBGE)

    ArtigoPenal:
      type: object
      description: Artigo penal resumido (para autocomplete/Select2)
      properties:
        codigo:
          type: string
          description: Codigo do artigo (ex "121", "121.1", "121.1.I")
          example: "121"
        codigoFormatado:
          type: string
          description: Codigo formatado para exibicao (ex "Art. 121 do CP")
          example: "Art. 121 do CP"
        descricao:
          type: string
          description: Descricao resumida do artigo
          example: "Homicidio simples"
        tipo:
          type: string
          description: Tipo (crime ou contravencao)
          example: "crime"
          enum: 
            - crime
            - contravencao
        legislacao:
          type: string
          description: Codigo da legislacao (CP, LCP, etc)
          example: "CP"
        legislacaoNome:
          type: string
          description: Nome completo da legislacao
          example: "Codigo Penal"
        idUnico:
          type: string
          description: Identificador unico no formato "LEGISLACAO:CODIGO" para evitar ambiguidade quando o mesmo codigo aparece em multiplas legislacoes
          example: "CP:121"

    ArtigoPenalCompleto:
      type: object
      description: Artigo penal completo (com todos os detalhes)
      allOf:
        - $ref: '#/components/schemas/ArtigoPenal'
        - type: object
          properties:
            artigo:
              type: integer
              description: Número do artigo
              example: 121
            paragrafo:
              type: integer
              nullable: true
              description: Número do parágrafo (se aplicável)
              example: 1
            inciso:
              type: string
              nullable: true
              description: Inciso (se aplicável)
              example: "I"
            alinea:
              type: string
              nullable: true
              description: Alínea (se aplicável)
              example: "a"
            textoCompleto:
              type: string
              description: Texto completo do artigo
              example: "Matar alguém:\nPena - reclusão, de 6 (seis) a 20 (vinte) anos."
            penaMin:
              type: string
              nullable: true
              description: Penalidade mínima
              example: "Reclusão, de 6 a 20 anos"
            penaMax:
              type: string
              nullable: true
              description: Penalidade máxima
              example: ""
            createdAt:
              type: string
              format: date-time
              description: Data de criação
            updatedAt:
              type: string
              format: date-time
              description: Data de atualização
            hashConteudo:
              type: string
              description: Hash SHA256 do conteudo para rastreamento de alteracoes na fonte oficial
              example: "a1b2c3d4e5f6..."
            idUnico:
              type: string
              description: Identificador unico no formato "LEGISLACAO:CODIGO" para evitar ambiguidade
              example: "CP:121"

    Error:
      type: object
      description: Resposta de erro padronizada (RFC 7807)
      properties:
        type:
          type: string
          description: URI que identifica o tipo de erro
          example: "https://retech-core/errors/not-found"
        title:
          type: string
          description: Resumo do erro
          example: "Not Found"
        status:
          type: integer
          description: Codigo HTTP
          example: 404
        detail:
          type: string
          description: Explicação detalhada do erro
          example: "Recurso não encontrado"

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        ## Como usar sua API Key
        
        Todas as requisições para endpoints `/geo/*` requerem autenticação via API Key.
        
        **Passo 1: Obter sua API Key**
        
        Acesse o [Portal do Desenvolvedor](https://core.theretech.com.br/painel/apikeys) e gere uma nova chave.
        
        **Passo 2: Usar no header**
        
        ```bash
        curl __API_BASE_URL__/geo/ufs \
          -H "X-API-Key: sua_api_key_aqui"
        ```
        
        **Rate Limits:**
        - Plano Free: 100 requests/dia, 5/min
        - Plano Starter: 1.000 requests/dia, 30/min
        - Plano Pro: 10.000 requests/dia, 120/min
        - Plano Business: 100.000 requests/dia, 600/min
        - Plano Enterprise: Custom

  responses:
    Unauthorized:
      description: Não autorizado - API Key inválida ou ausente
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: "https://retech-core/errors/unauthorized"
            title: "Unauthorized"
            status: 401
            detail: "API Key inválida ou ausente. Use o header X-API-Key com uma chave válida."

    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: "https://retech-core/errors/not-found"
            title: "Not Found"
            status: 404
            detail: "O recurso solicitado não foi encontrado."

    TooManyRequests:
      description: Rate limit excedido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: "https://retech-core/errors/rate-limit"
            title: "Too Many Requests"
            status: 429
            detail: "Você excedeu o limite de requisições. Tente novamente mais tarde."

    Maintenance:
      description: API em manutenção
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: "https://retech-core/errors/maintenance"
            title: "API em Manutenção"
            status: 503
            detail: "A API está temporariamente indisponível para manutenção. Por favor, tente novamente mais tarde."
