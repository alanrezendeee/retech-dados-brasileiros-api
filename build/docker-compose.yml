services:
  api:
    build:
      context: ..
      dockerfile: build/Dockerfile
    image: theretech/retech-core:dev
    env_file: ../.env
    environment:
      - API_BASE_URL=http://localhost:8080
      - APIKEY_HASH_SECRET=dev-apikey-secret-change-in-production
      - CEPDB_URL=postgres://retech:retech@postgres:5432/cepdb?sslmode=disable
    ports:
      - "8080:8080"
    volumes:
      - ../seeds:/app/seeds:ro
    depends_on:
      - mongo
      - redis
      - postgres

  crawler:
    build:
      context: ..
      dockerfile: build/Dockerfile.crawler
    image: theretech/retech-crawler:dev
    env_file: ../.env
    environment:
      - CEPDB_URL=postgres://retech:retech@postgres:5432/cepdb?sslmode=disable
      - CRAWLER_WORKERS=3
      - CRAWLER_ENUMERATE=false
    depends_on:
      - postgres
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ../scripts:/docker-entrypoint-initdb.d:ro
    environment:
      - MONGO_INITDB_DATABASE=retech_core

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cepdb
      - POSTGRES_USER=retech
      - POSTGRES_PASSWORD=retech
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  mongo-data:
  redis-data:
  postgres-data:

